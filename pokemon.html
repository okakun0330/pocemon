<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ランダムポケモン</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 2rem;
      letter-spacing: 0.05em;
      text-shadow: 0 0 20px rgba(255, 204, 0, 0.6);
      color: #ffcc00;
    }

    #card {
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 24px;
      padding: 2.5rem 3rem;
      width: 320px;
      min-height: 380px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
      transition: transform 0.2s;
    }

    #card:not(.loading):hover {
      transform: translateY(-4px);
    }

    #sprite {
      width: 160px;
      height: 160px;
      image-rendering: pixelated;
      filter: drop-shadow(0 4px 12px rgba(255,204,0,0.4));
      transition: opacity 0.3s;
    }

    #name {
      font-size: 2rem;
      font-weight: 700;
      text-transform: capitalize;
      margin-top: 1rem;
      letter-spacing: 0.05em;
    }

    #number {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.5);
      margin-top: 0.25rem;
    }

    #types {
      display: flex;
      gap: 0.5rem;
      margin-top: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .type-badge {
      padding: 0.3rem 0.9rem;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    #stats {
      width: 100%;
      margin-top: 1.5rem;
    }

    .stat-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .stat-label {
      width: 60px;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.6);
      text-align: right;
      text-transform: uppercase;
    }

    .stat-bar-bg {
      flex: 1;
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
    }

    .stat-bar {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, #ffcc00, #ff6b6b);
      transition: width 0.6s ease;
    }

    .stat-value {
      width: 30px;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.8);
    }

    #btn {
      margin-top: 2rem;
      padding: 0.85rem 2.5rem;
      font-size: 1rem;
      font-weight: 700;
      color: #1a1a2e;
      background: linear-gradient(135deg, #ffcc00, #ffaa00);
      border: none;
      border-radius: 999px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(255,204,0,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
      letter-spacing: 0.05em;
    }

    #btn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 28px rgba(255,204,0,0.55);
    }

    #btn:active {
      transform: scale(0.97);
    }

    #btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .placeholder-text {
      color: rgba(255,255,255,0.4);
      font-size: 1rem;
      text-align: center;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top-color: #ffcc00;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.92); }
      to   { opacity: 1; transform: scale(1); }
    }

    .fade-in {
      animation: fadeIn 0.35s ease;
    }
  </style>
</head>
<body>

<h1>ランダムポケモン</h1>

<div id="card">
  <p class="placeholder-text">ボタンを押してポケモンを召喚！</p>
</div>

<button id="btn" onclick="loadRandom()">ランダムに表示</button>

<script>
  const TYPE_COLORS = {
    normal:   '#a8a878', fire:     '#f08030', water:    '#6890f0',
    electric: '#f8d030', grass:    '#78c850', ice:      '#98d8d8',
    fighting: '#c03028', poison:   '#a040a0', ground:   '#e0c068',
    flying:   '#a890f0', psychic:  '#f85888', bug:      '#a8b820',
    rock:     '#b8a038', ghost:    '#705898', dragon:   '#7038f8',
    dark:     '#705848', steel:    '#b8b8d0', fairy:    '#ee99ac',
  };

  const TYPE_JA = {
    normal: 'ノーマル', fire: 'ほのお', water: 'みず',
    electric: 'でんき', grass: 'くさ', ice: 'こおり',
    fighting: 'かくとう', poison: 'どく', ground: 'じめん',
    flying: 'ひこう', psychic: 'エスパー', bug: 'むし',
    rock: 'いわ', ghost: 'ゴースト', dragon: 'ドラゴン',
    dark: 'あく', steel: 'はがね', fairy: 'フェアリー',
  };

  const STAT_LABELS = {
    hp:               'HP',
    attack:           'こうげき',
    defense:          'ぼうぎょ',
    'special-attack': 'とくこう',
    'special-defense':'とくぼう',
    speed:            'すばやさ',
  };

  const TOTAL = 1025;

  async function loadRandom() {
    const btn = document.getElementById('btn');
    const card = document.getElementById('card');
    btn.disabled = true;
    card.classList.add('loading');
    card.innerHTML = '<div class="spinner"></div>';

    try {
      const id = Math.floor(Math.random() * TOTAL) + 1;
      const [res, speciesRes] = await Promise.all([
        fetch(`https://pokeapi.co/api/v2/pokemon/${id}`),
        fetch(`https://pokeapi.co/api/v2/pokemon-species/${id}`),
      ]);
      if (!res.ok) throw new Error('fetch failed');
      const data = await res.json();
      const species = speciesRes.ok ? await speciesRes.json() : null;

      const jaName = species?.names?.find(n => n.language.name === 'ja-Hrkt')?.name
                  || species?.names?.find(n => n.language.name === 'ja')?.name
                  || data.name;

      const sprite =
        data.sprites.other?.['official-artwork']?.front_default ||
        data.sprites.front_default ||
        '';

      const types = data.types.map(t => t.type.name);
      const stats = data.stats;

      card.classList.remove('loading');
      card.innerHTML = `
        <div class="fade-in" style="display:flex;flex-direction:column;align-items:center;width:100%">
          ${sprite ? `<img id="sprite" src="${sprite}" alt="${jaName}">` : ''}
          <div id="name">${jaName}</div>
          <div id="number">No. ${String(data.id).padStart(4,'0')}</div>
          <div id="types">
            ${types.map(t => `
              <span class="type-badge" style="background:${TYPE_COLORS[t] || '#888'}">
                ${TYPE_JA[t] || t}
              </span>
            `).join('')}
          </div>
          <div id="stats">
            ${stats.map(s => `
              <div class="stat-row">
                <span class="stat-label">${STAT_LABELS[s.stat.name] || s.stat.name}</span>
                <div class="stat-bar-bg">
                  <div class="stat-bar" style="width:${Math.min(s.base_stat / 255 * 100, 100)}%"></div>
                </div>
                <span class="stat-value">${s.base_stat}</span>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    } catch (e) {
      card.innerHTML = '<p class="placeholder-text">エラーが発生しました。<br>もう一度お試しください。</p>';
    } finally {
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
