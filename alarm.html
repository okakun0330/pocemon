<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alarm</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 48px;
    }

    /* 現在時刻 */
    #clock {
      font-size: 72px;
      font-weight: 100;
      letter-spacing: -2px;
      color: #fff;
      margin-bottom: 48px;
      font-variant-numeric: tabular-nums;
    }

    /* アラーム追加フォーム */
    .add-form {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 40px;
    }

    .add-form input[type="time"] {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 10px;
      color: #fff;
      font-size: 28px;
      font-weight: 200;
      padding: 14px 20px;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .add-form input[type="time"]:focus {
      border-color: #555;
    }

    .add-form input[type="time"]::-webkit-calendar-picker-indicator {
      filter: invert(1) opacity(0.4);
      cursor: pointer;
    }

    .btn-add {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: #fff;
      border: none;
      color: #000;
      font-size: 28px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, background 0.15s;
      flex-shrink: 0;
    }

    .btn-add:hover {
      transform: scale(1.08);
      background: #ddd;
    }

    .btn-add:active {
      transform: scale(0.95);
    }

    /* アラームリスト */
    #alarm-list {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .alarm-item {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: border-color 0.2s;
    }

    .alarm-item.active {
      border-color: #444;
    }

    .alarm-item.ringing {
      border-color: #fff;
      animation: pulse 0.6s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from { background: #1a1a1a; }
      to   { background: #2a2a2a; }
    }

    .alarm-time {
      font-size: 36px;
      font-weight: 200;
      letter-spacing: -1px;
      font-variant-numeric: tabular-nums;
    }

    .alarm-item.disabled .alarm-time {
      color: #444;
    }

    .alarm-controls {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    /* トグルスイッチ */
    .toggle {
      position: relative;
      width: 44px;
      height: 26px;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: #333;
      border-radius: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle input:checked + .toggle-track {
      background: #fff;
    }

    .toggle-track::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 20px;
      height: 20px;
      background: #666;
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }

    .toggle input:checked + .toggle-track::after {
      transform: translateX(18px);
      background: #000;
    }

    .btn-delete {
      background: none;
      border: none;
      color: #444;
      font-size: 20px;
      cursor: pointer;
      line-height: 1;
      transition: color 0.2s;
      padding: 4px;
    }

    .btn-delete:hover {
      color: #888;
    }

    /* 鳴動中バナー */
    #ringing-banner {
      display: none;
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff;
      color: #000;
      border-radius: 16px;
      padding: 18px 28px;
      font-size: 18px;
      font-weight: 500;
      display: none;
      align-items: center;
      gap: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      z-index: 100;
      white-space: nowrap;
    }

    #ringing-banner.show {
      display: flex;
    }

    .btn-stop {
      background: #000;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-stop:hover {
      background: #222;
    }

    .empty {
      color: #444;
      font-size: 14px;
      text-align: center;
      padding: 24px 0;
    }
  </style>
</head>
<body>

  <h1>Alarm</h1>
  <div id="clock">00:00:00</div>

  <div class="add-form">
    <input type="time" id="time-input">
    <button class="btn-add" onclick="addAlarm()">+</button>
  </div>

  <div id="alarm-list"></div>

  <div id="ringing-banner">
    <span id="ringing-time"></span>
    <button class="btn-stop" onclick="stopAlarm()">止める</button>
  </div>

  <audio id="alarm-sound" loop>
    <source src="data:audio/wav;base64," type="audio/wav">
  </audio>

  <script>
    let alarms = JSON.parse(localStorage.getItem('alarms') || '[]');
    let ringingId = null;
    let audioCtx = null;
    let gainNode = null;
    let oscillator = null;

    // 現在時刻の更新
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      const s = String(now.getSeconds()).padStart(2, '0');
      document.getElementById('clock').textContent = `${h}:${m}:${s}`;
      checkAlarms(h, m, s);
    }

    // アラームチェック
    function checkAlarms(h, m, s) {
      if (ringingId !== null) return;
      const current = `${h}:${m}`;
      alarms.forEach(a => {
        if (a.enabled && a.time === current && s === '00') {
          triggerAlarm(a.id, a.time);
        }
      });
    }

    function triggerAlarm(id, time) {
      ringingId = id;
      document.getElementById('ringing-time').textContent = `${time} のアラーム`;
      document.getElementById('ringing-banner').classList.add('show');
      renderList();
      playBeep();
    }

    function stopAlarm() {
      ringingId = null;
      document.getElementById('ringing-banner').classList.remove('show');
      stopBeep();
      renderList();
    }

    // Web Audio API でビープ音
    function playBeep() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      gainNode = audioCtx.createGain();
      gainNode.gain.value = 0.3;
      gainNode.connect(audioCtx.destination);

      function beepCycle() {
        if (!audioCtx) return;
        oscillator = audioCtx.createOscillator();
        oscillator.type = 'sine';
        oscillator.frequency.value = 880;
        oscillator.connect(gainNode);
        oscillator.start();
        setTimeout(() => {
          if (oscillator) { oscillator.stop(); oscillator = null; }
          if (audioCtx) setTimeout(beepCycle, 400);
        }, 600);
      }
      beepCycle();
    }

    function stopBeep() {
      if (oscillator) { try { oscillator.stop(); } catch(e) {} oscillator = null; }
      if (audioCtx) { audioCtx.close(); audioCtx = null; }
    }

    // アラーム追加
    function addAlarm() {
      const input = document.getElementById('time-input');
      const time = input.value;
      if (!time) return;
      const id = Date.now();
      alarms.push({ id, time, enabled: true });
      alarms.sort((a, b) => a.time.localeCompare(b.time));
      save();
      renderList();
      input.value = '';
    }

    // 削除
    function deleteAlarm(id) {
      alarms = alarms.filter(a => a.id !== id);
      save();
      renderList();
    }

    // トグル
    function toggleAlarm(id) {
      const a = alarms.find(a => a.id === id);
      if (a) a.enabled = !a.enabled;
      save();
      renderList();
    }

    function save() {
      localStorage.setItem('alarms', JSON.stringify(alarms));
    }

    // リスト描画
    function renderList() {
      const list = document.getElementById('alarm-list');
      if (alarms.length === 0) {
        list.innerHTML = '<p class="empty">アラームがありません</p>';
        return;
      }
      list.innerHTML = alarms.map(a => `
        <div class="alarm-item ${a.enabled ? 'active' : 'disabled'} ${ringingId === a.id ? 'ringing' : ''}">
          <span class="alarm-time">${a.time}</span>
          <div class="alarm-controls">
            <label class="toggle">
              <input type="checkbox" ${a.enabled ? 'checked' : ''} onchange="toggleAlarm(${a.id})">
              <span class="toggle-track"></span>
            </label>
            <button class="btn-delete" onclick="deleteAlarm(${a.id})">✕</button>
          </div>
        </div>
      `).join('');
    }

    // Enterキーで追加
    document.getElementById('time-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addAlarm();
    });

    // 初期化
    renderList();
    setInterval(updateClock, 1000);
    updateClock();
  </script>
</body>
</html>
